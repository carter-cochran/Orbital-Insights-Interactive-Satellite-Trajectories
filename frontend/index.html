<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orbital Insights - Cesium Viewer</title>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #viewer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      #panel {
        position: absolute;
        top: 16px;
        left: 16px;
        background: rgba(10, 14, 24, 0.8);
        color: #f5f5f5;
        padding: 12px 14px;
        border-radius: 8px;
        z-index: 1;
        min-width: 260px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      #panel h1 {
        font-size: 14px;
        margin: 0 0 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      #panel label {
        display: block;
        font-size: 12px;
        margin-bottom: 4px;
      }

      #panel input {
        width: 100%;
        padding: 6px 8px;
        border-radius: 6px;
        border: none;
        margin-bottom: 8px;
      }

      #panel button {
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: none;
        background: #00bcd4;
        color: #08131a;
        font-weight: 600;
        cursor: pointer;
      }

      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #f7d154;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <div id="panel">
      <h1>Orbital Insights</h1>
      <label for="ids">NORAD IDs</label>
      <input id="ids" type="text" value="25544" />

      <label for="minutes">Minutes</label>
      <input id="minutes" type="number" min="1" max="360" value="90" />

      <label for="step">Step (seconds)</label>
      <input id="step" type="number" min="5" max="60" value="10" />

      <button id="load">Load Satellites</button>
      <div id="status"></div>
    </div>

    <div id="viewer"></div>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
    <script src="config.js"></script>
    <script src="main.js"></script>
  </body>
</html>
